
services:
  postegres:
    image: postgres:15
    container_name: pg_db
    restart: always
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: reminder
    ports:
      - "5444:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: redis_queue
    restart: always
    ports:
      - "6444:6379"

volumes:
  pg_data:
